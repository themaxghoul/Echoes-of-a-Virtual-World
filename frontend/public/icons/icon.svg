<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f11"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Diamond/Crystal shape -->
  <path d="M256 80 L400 256 L256 432 L112 256 Z" fill="url(#gold)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Inner diamond highlight -->
  <path d="M256 120 L360 256 L256 392 L152 256 Z" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
  
  <!-- Center sparkle -->
  <circle cx="256" cy="256" r="20" fill="#fff" opacity="0.8"/>
  <circle cx="256" cy="256" r="8" fill="#ffd700"/>
  
  <!-- Small decorative dots -->
  <circle cx="256" cy="140" r="6" fill="#fff" opacity="0.6"/>
  <circle cx="340" cy="256" r="6" fill="#fff" opacity="0.6"/>
  <circle cx="256" cy="372" r="6" fill="#fff" opacity="0.6"/>
  <circle cx="172" cy="256" r="6" fill="#fff" opacity="0.6"/>
</svg>
